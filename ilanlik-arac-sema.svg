<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520" role="img" aria-label="İlanlık araç ekspertiz şeması">
  <defs>
    <linearGradient id="panelGray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7d7d7"/>
      <stop offset="100%" stop-color="#c7c7c7"/>
    </linearGradient>
    <linearGradient id="glassWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f3f3"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>
  <style>
    .veh-bg{ fill:#f8f3e4; }
    .part{ fill:url(#panelGray); stroke:#f4f4f4; stroke-width:5; stroke-linejoin:round; stroke-linecap:round; cursor:pointer; transition:.2s ease; }
    .part:hover{ filter:brightness(.94); }
    .glass{ pointer-events:none; fill:url(#glassWhite); stroke:#d7d7d7; stroke-width:3; stroke-linejoin:round; stroke-linecap:round; }
    .wheel{ pointer-events:none; fill:#d4d4d4; stroke:#f4f4f4; stroke-width:5; }
    .small-detail{ pointer-events:none; fill:#d4d4d4; stroke:#f4f4f4; stroke-width:4; }
  </style>

  <rect class="veh-bg" x="0" y="0" width="520" height="520" rx="16"/>

  <g filter="url(#softShadow)">
    <!-- ON TAMPON -->
    <path id="on-tampon" data-part="on-tampon" class="part" d="M178 29 Q260 18 342 29 Q349 31 351 39 L351 60 Q351 70 341 72 L179 72 Q169 70 169 60 L169 39 Q171 31 178 29 Z"/>
    <g pointer-events="none">
      <rect class="glass" x="194" y="42" width="34" height="13" rx="7"/>
      <rect class="glass" x="292" y="42" width="34" height="13" rx="7"/>
      <rect class="small-detail" x="203" y="9" width="31" height="18" rx="6"/>
      <rect class="small-detail" x="286" y="9" width="31" height="18" rx="6"/>
    </g>

    <!-- ORTA GOVDE -->
    <path id="kaput" data-part="kaput" class="part" d="M184 102 Q260 80 336 102 Q349 107 353 121 Q357 154 352 198 Q307 188 260 188 Q213 188 168 198 Q163 154 167 121 Q171 107 184 102 Z"/>
    <path id="tavan" data-part="tavan" class="part" d="M176 207 Q260 194 344 207 L344 335 Q260 348 176 335 Z"/>
    <path id="bagaj" data-part="bagaj" class="part" d="M168 335 Q213 345 260 345 Q307 345 352 335 Q357 379 353 414 Q349 428 336 433 Q260 454 184 433 Q171 428 167 414 Q163 379 168 335 Z"/>
    <g pointer-events="none">
      <path class="glass" d="M171 198 Q213 188 260 188 Q307 188 349 198 L332 249 Q260 236 188 249 Z"/>
      <path class="glass" d="M188 335 Q260 348 332 335 L349 390 Q307 402 260 402 Q213 402 171 390 Z"/>
    </g>

    <!-- SOL TARAF -->
    <path id="marspiyel-sol" data-part="marspiyel-sol" class="part" d="M49 75 L67 75 L67 447 L49 447 Q43 442 43 433 L43 89 Q43 80 49 75 Z"/>
    <path id="camurluk-sol-on" data-part="camurluk-sol-on" class="part" d="M67 75 L97 75 Q108 100 113 129 Q111 150 104 166 Q88 158 67 158 Z"/>
    <path id="kapi-sol-on" data-part="kapi-sol-on" class="part" d="M67 158 Q88 158 104 166 Q135 196 157 276 L67 255 Z"/>
    <path id="kapi-sol-arka" data-part="kapi-sol-arka" class="part" d="M67 255 L157 276 Q150 337 113 369 Q90 363 67 348 Z"/>
    <path id="camurluk-sol-arka" data-part="camurluk-sol-arka" class="part" d="M67 348 Q90 363 113 369 Q108 414 97 447 L67 447 Z"/>

