    <g pointer-events="none">
      <circle class="wheel" cx="45" cy="142" r="34"/>
      <circle class="wheel" cx="45" cy="378" r="34"/>
      <circle class="wheel" cx="475" cy="142" r="34"/>
      <circle class="wheel" cx="475" cy="378" r="34"/>
    </g>

    <!-- ARKA TAMPON -->
    <path id="arka-tampon" data-part="arka-tampon" class="part" d="M178 448 Q260 459 342 448 Q349 446 351 456 L351 481 Q351 491 341 493 L179 493 Q169 491 169 481 L169 456 Q171 446 178 448 Z"/>
    <g pointer-events="none">
      <rect class="glass" x="194" y="464" width="34" height="13" rx="7"/>
      <rect class="glass" x="292" y="464" width="34" height="13" rx="7"/>
      <rect class="small-detail" x="203" y="493" width="31" height="18" rx="6"/>
      <rect class="small-detail" x="286" y="493" width="31" height="18" rx="6"/>
