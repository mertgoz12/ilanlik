    <path id="marspiyel-sag" data-part="marspiyel-sag" class="part" d="M471 75 L453 75 L453 447 L471 447 Q477 442 477 433 L477 89 Q477 80 471 75 Z"/>
    <path id="camurluk-sag-on" data-part="camurluk-sag-on" class="part" d="M453 75 L423 75 Q412 100 407 129 Q409 150 416 166 Q432 158 453 158 Z"/>
    <path id="kapi-sag-on" data-part="kapi-sag-on" class="part" d="M453 158 Q432 158 416 166 Q385 196 363 276 L453 255 Z"/>
    <path id="kapi-sag-arka" data-part="kapi-sag-arka" class="part" d="M453 255 L363 276 Q370 337 407 369 Q430 363 453 348 Z"/>
    <path id="camurluk-sag-arka" data-part="camurluk-sag-arka" class="part" d="M453 348 Q430 363 407 369 Q412 414 423 447 L453 447 Z"/>

